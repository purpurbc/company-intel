services:
  db:
    image: postgres:16
    container_name: companyintel-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: companyintel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d companyintel"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata: