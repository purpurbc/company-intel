services:
  - type: web
    name: company-intel-api
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging
      - key: CORS_ORIGINS
        value: http://localhost:3000
      - key: DATABASE_URL
        sync: false
